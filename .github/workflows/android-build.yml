name: Build Release APK

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

env:
  NODE_VERSION: '20'

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        continue-on-error: true

      - name: Install dependencies (npm ci fallback)
        if: failure()
        run: npm ci

      - name: Generate native Android project
        run: npx expo prebuild --platform android --clean
        env:
          CI: true

      - name: Install Android dependencies
        run: cd android && ./gradlew dependencies --configuration releaseRuntimeClasspath
        continue-on-error: true

      - name: Build Release APK
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon --info 2>&1 | tail -100
        env:
          CI: true
          JAVA_HOME: /opt/java/openjdk

      - name: Build Debug APK
        if: failure()
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon
        env:
          CI: true
          JAVA_HOME: /opt/java/openjdk

      - name: Find APK files
        id: find-apk
        run: |
          echo "=== Release APKs ==="
          find android -name "*.apk" -type f 2>/dev/null || echo "No release APK found"
          echo "=== Debug APKs ==="
          find android -name "*-debug.apk" -type f 2>/dev/null || echo "No debug APK found"

      - name: Upload Release APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 14
          if-no-files-found: error

      - name: Upload Debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 14
          if-no-files-found: ignore
