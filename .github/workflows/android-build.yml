name: Build Android APK

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Checkout
        run: |
          git clone --depth 1 https://github.com/huda1509354llll-crypto/lnreader-translate.git .
          git fetch --tags

      - name: Setup Node
        run: |
          curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
          apt-get install -y nodejs
          npm install -g pnpm@8

      - name: Install dependencies
        run: pnpm install --frozen-lockfile || pnpm install

      - name: Setup Java
        run: |
          apt-get update && apt-get install -y openjdk-17-jdk
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV

      - name: Setup Android SDK
        run: |
          apt-get install -y android-sdk
          echo "ANDROID_HOME=/usr/lib/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=/usr/lib/android-sdk" >> $GITHUB_ENV

      - name: Expo prebuild
        run: npx expo prebuild --platform android --clean
        env:
          CI: true

      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon -x lint -x test
        env:
          CI: true
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: lnreader-apk
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 7
